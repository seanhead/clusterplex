name: Docker Builds

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
  push:
    branches:
      - "master"
      - "dev"
      - "experimental"
    tags:
      - "v*.*.*"
    paths-ignore:
      - 'charts/**'
  pull_request:
    branches:
      - "master"
      - "dev"
    paths-ignore:
      - 'charts/**'

permissions:
  contents: read
  packages: write

jobs:
  check-base-image:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Get current linuxserver/plex digest
        id: current
        run: |
          DIGEST=$(docker buildx imagetools inspect linuxserver/plex:latest --format '{{json .Manifest}}' | jq -r '.digest // .config.digest' 2>/dev/null || true)
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            DIGEST=$(skopeo inspect --raw docker://linuxserver/plex:latest | jq -r '.digest // empty' 2>/dev/null || true)
          fi
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            DIGEST=$(curl -s "https://hub.docker.com/v2/repositories/linuxserver/plex/tags/latest" | jq -r '.digest')
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Current digest: $DIGEST"

      - name: Restore cached digest
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .base-image-digest
          key: base-image-digest-${{ steps.current.outputs.digest }}
          restore-keys: |
            base-image-digest-

      - name: Compare digests
        id: check
        run: |
          if [ -f .base-image-digest ]; then
            CACHED=$(cat .base-image-digest)
            echo "Cached digest: $CACHED"
            if [ "$CACHED" = "${{ steps.current.outputs.digest }}" ]; then
              echo "Base image unchanged"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Base image changed"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No cached digest found, assuming changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save new digest to cache
        if: steps.check.outputs.changed == 'true'
        run: echo "${{ steps.current.outputs.digest }}" > .base-image-digest

      - name: Update cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .base-image-digest
          key: base-image-digest-${{ steps.current.outputs.digest }}

  build-pms:
    needs: check-base-image
    if: ${{ github.event_name != 'schedule' || needs.check-base-image.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && github.repository == 'pabloromeo/clusterplex'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker meta for PMS
        id: meta_pms
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository == 'pabloromeo/clusterplex' && 'pabloromeo/clusterplex_pms' || '' }}
            ghcr.io/${{ github.repository_owner }}/clusterplex_pms
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Build and push PMS
        uses: docker/build-push-action@v5
        with:
          context: ./pms
          file: ./pms/extended-image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_pms.outputs.tags }}
          labels: ${{ steps.meta_pms.outputs.labels }}
      - name: Docker Hub Description
        if: github.event_name != 'pull_request' && github.repository == 'pabloromeo/clusterplex'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: pabloromeo/clusterplex_pms
          readme-filepath: ./README.md
          short-description: "PMS image for ClusterPlex"

  build-worker:
    needs: check-base-image
    if: ${{ github.event_name != 'schedule' || needs.check-base-image.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && github.repository == 'pabloromeo/clusterplex'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta for Worker
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository == 'pabloromeo/clusterplex' && 'pabloromeo/clusterplex_worker' || '' }}
            ghcr.io/${{ github.repository_owner }}/clusterplex_worker
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/extended-image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}

      - name: Docker meta for Worker HW
        id: meta_worker_hw
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository == 'pabloromeo/clusterplex' && 'pabloromeo/clusterplex_worker_hw' || '' }}
            ghcr.io/${{ github.repository_owner }}/clusterplex_worker_hw
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Worker HW
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/extended-image-hw/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_worker_hw.outputs.tags }}
          labels: ${{ steps.meta_worker_hw.outputs.labels }}

      - name: Docker Hub Description
        if: github.event_name != 'pull_request' && github.repository == 'pabloromeo/clusterplex'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: pabloromeo/clusterplex_worker
          readme-filepath: ./README.md
          short-description: "Worker image for ClusterPlex"

  build-orchestrator:
    needs: check-base-image
    if: ${{ github.event_name != 'schedule' || needs.check-base-image.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && github.repository == 'pabloromeo/clusterplex'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta for Orchestrator
        id: meta_orchestrator
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository == 'pabloromeo/clusterplex' && 'pabloromeo/clusterplex_orchestrator' || '' }}
            ghcr.io/${{ github.repository_owner }}/clusterplex_orchestrator
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Build and push Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_orchestrator.outputs.tags }}
          labels: ${{ steps.meta_orchestrator.outputs.labels }}
      - name: Docker Hub Description
        if: github.event_name != 'pull_request' && github.repository == 'pabloromeo/clusterplex'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: pabloromeo/clusterplex_orchestrator
          readme-filepath: ./README.md
          short-description: "ClusterPlex Orchestrator image"
